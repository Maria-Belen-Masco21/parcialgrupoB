{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="form-container">

        <h3 class="text-center">Editar Cita</h3>

        <form method="POST">
            <input name="mascota" value="{{ cita[1] }}" class="form-control mb-3">
            <input name="propietario" value="{{ cita[2] }}" class="form-control mb-3">
            <input name="especie" value="{{ cita[3] }}" class="form-control mb-3">
            <input name="fecha" value="{{ cita[4] }}" class="form-control mb-3">

            <button class="btn btn-warning w-100">Actualizar</button>
        </form>

    </div>
</div>
{% endblock %}
