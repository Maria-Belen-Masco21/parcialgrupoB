{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="form-container">

        <h3 class="text-center">Nueva Cita</h3>

        <form method="POST">
            <input name="mascota" class="form-control mb-3" placeholder="Mascota" required>
            <input name="propietario" class="form-control mb-3" placeholder="Propietario" required>
            <input name="especie" class="form-control mb-3" placeholder="Especie">
            <input name="fecha" type="date" class="form-control mb-3" required>

            <button class="btn btn-success w-100">Guardar</button>
        </form>

    </div>
</div>
{% endblock %}
